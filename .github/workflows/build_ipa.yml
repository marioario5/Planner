name: Build IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate iOS project files
        run: flutter create --platforms=ios . --project-name cozyplanner

      - name: Set app display name
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Planner" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Planner" ios/Runner/Info.plist

      - name: Inject Google Sign-In client ID
        run: |
          /usr/libexec/PlistBuddy -c "Add :GIDClientID string 1036343782202-ncvphkc4aimo4u9vphar72vl14ggrgtm.apps.googleusercontent.com" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string com.googleusercontent.apps.1036343782202-ncvphkc4aimo4u9vphar72vl14ggrgtm" ios/Runner/Info.plist

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Disable code signing
        run: |
          cd ios
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.wiggins22.planner" Runner/Info.plist
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj

      - name: Build iOS (no codesign)
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            | xcpretty || true
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            EXPANDED_CODE_SIGN_IDENTITY=""

      - name: Package into IPA
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/Runner.app Payload/
          zip -r cozyplanner.ipa Payload/
          rm -rf Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: cozy_planner-ipa
          path: cozyplanner.ipa
          retention-days: 30